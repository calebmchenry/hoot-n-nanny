<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Hoot 'n Nanny</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
      }

      body {
        background: #10243f;
        overflow: hidden;
      }

      #game-container {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100dvh;
        box-sizing: border-box;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom)
          env(safe-area-inset-left);
      }

      #game-container canvas {
        display: block;
      }

      #rotate-prompt {
        position: absolute;
        inset: 0;
        z-index: 10;
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 14px;
        background: rgba(16, 36, 63, 0.96);
        color: #f8f3e5;
        font-family: monospace;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0.2px;
        pointer-events: all;
      }

      #rotate-prompt.is-visible {
        display: flex;
      }

      #rotate-prompt .phone-icon {
        width: 44px;
        height: 74px;
        border: 3px solid #f8f3e5;
        border-radius: 12px;
        transform: rotate(90deg);
        position: relative;
        opacity: 0.9;
      }

      #rotate-prompt .phone-icon::after {
        content: '';
        position: absolute;
        width: 14px;
        height: 3px;
        background: #f8f3e5;
        left: 50%;
        transform: translateX(-50%);
        bottom: 7px;
        border-radius: 3px;
      }

      @media (orientation: landscape) and (max-height: 599px) {
        #rotate-prompt {
          display: flex;
        }
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="rotate-prompt" aria-hidden="true">
        <div class="phone-icon" aria-hidden="true"></div>
        <div>Rotate your device</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
